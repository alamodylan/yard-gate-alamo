{% extends "base.html" %}
{% block title %}Login | Yard Gate Álamo{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-cover">
      <img
        src="{{ url_for('static', filename='icons/icon-512.png') }}"
        alt="Yard Gate Álamo"
        class="login-logo"
      >

      <h2>Yard Gate Alamo</h2>
      <p>Control operativo de patio, Inspeccion, EIR e inventario.</p>
    </div>

    <form method="post" class="login-form">
      <h3>Iniciar sesión</h3>

      <label>Usuario</label>
      <input
        name="username"
        autocomplete="username"
        placeholder="Ingrese su usuario"
        required
      >

      <label>Contraseña</label>
      <input
        name="password"
        type="password"
        autocomplete="current-password"
        placeholder="Ingrese su contraseña"
        required
      >

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<style>
.login-page{
  min-height:calc(100vh - 150px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 12px;
}

.login-card{
  width:min(920px, 100%);
  display:grid;
  grid-template-columns:1fr 1fr;
  overflow:hidden;
  border-radius:28px;
  background:#ffffff;
  border:1px solid #dbe3ef;
  box-shadow:0 24px 70px rgba(15,23,42,.14);
}

.login-cover{
  position:relative;
  padding:44px 36px;
  background:linear-gradient(135deg, #0f3b63, #1d4ed8);
  color:#ffffff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.login-cover::before{
  content:"";
  position:absolute;
  inset:18px;
  border:1px solid rgba(255,255,255,.20);
  border-radius:24px;
  pointer-events:none;
}

.login-logo{
  width:150px;
  height:150px;
  object-fit:contain;
  border-radius:30px;
  background:rgba(255,255,255,.12);
  padding:14px;
  box-shadow:0 18px 45px rgba(15,23,42,.25);
  margin-bottom:20px;
}

.login-cover h2{
  position:relative;
  margin:0;
  font-size:30px;
  font-weight:950;
  letter-spacing:-.04em;
}

.login-cover p{
  position:relative;
  margin:12px 0 0;
  max-width:330px;
  color:rgba(255,255,255,.86);
  font-size:14px;
  line-height:1.5;
  font-weight:700;
}

.login-form{
  padding:44px 38px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.login-form h3{
  margin:0 0 24px;
  color:#0f172a;
  font-size:26px;
  font-weight:950;
  letter-spacing:-.03em;
}

.login-form label{
  margin-bottom:7px;
  color:#334155;
  font-size:13px;
  font-weight:900;
}

.login-form input{
  width:100%;
  box-sizing:border-box;
  margin-bottom:16px;
  padding:13px 14px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  background:#f8fafc;
  color:#0f172a;
  font-size:15px;
  font-weight:700;
  outline:none;
}

.login-form input:focus{
  border-color:#2563eb;
  background:#ffffff;
  box-shadow:0 0 0 4px rgba(37,99,235,.14);
}

.login-form button{
  margin-top:6px;
  padding:13px 18px;
  border:0;
  border-radius:14px;
  background:#1d4ed8;
  color:#ffffff;
  font-size:15px;
  font-weight:950;
  cursor:pointer;
  box-shadow:0 12px 26px rgba(37,99,235,.25);
}

.login-form button:hover{
  background:#1e40af;
}

@media(max-width:760px){
  .login-card{
    grid-template-columns:1fr;
  }

  .login-cover{
    padding:34px 24px;
  }

  .login-logo{
    width:118px;
    height:118px;
  }

  .login-form{
    padding:34px 24px;
  }
}
</style>
{% endblock %}
